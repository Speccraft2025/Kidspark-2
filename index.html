<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Coloring Pages Are Ready</title>
    <!-- Quicksand for a friendly, soft rounded font suitable for a kids product -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --accent-green: #22c55e;
            --card-bg: #f9fafb;
            --card-border: #f3f4f6;
            --border-radius: 16px;
            --font-family: 'Quicksand', system-ui, -apple-system, sans-serif;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.03);
            --shadow-hover: 0 10px 15px -3px rgba(0,0,0,0.08);
            --transition-speed: 0.25s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* --- Header & Progress --- */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .subtext {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 24px;
        }

        .progress-container {
            max-width: 400px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 16px 20px;
            border-radius: 20px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            border: 1px solid var(--card-border);
        }

        .progress-text {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .progress-bar-bg {
            height: 8px;
            background-color: #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--accent-green);
            width: 0%;
            border-radius: 8px;
            transition: width 0.4s ease-out;
        }

        /* --- Grid & Cards --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 60px;
        }

        @media (min-width: 640px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }
        }

        @media (min-width: 1024px) {
            .gallery-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 24px;
            }
        }

        /* Responsive max column for xl screens */
        @media (min-width: 1280px) {
            .gallery-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .card {
            background: var(--bg-color);
            border-radius: var(--border-radius);
            border: 2px solid var(--card-border);
            overflow: hidden;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1), 
                        box-shadow var(--transition-speed) ease,
                        border-color var(--transition-speed) ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        .img-wrapper {
            width: 100%;
            /* 3:4 aspect ratio typical for standard A4/Letter size coloring pages */
            aspect-ratio: 3 / 4; 
            background: #f3f4f6;
            overflow: hidden;
            position: relative;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .card:hover img {
            transform: scale(1.03); /* subtle zoom on hover */
        }

        .card-info {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-color);
            position: relative;
            z-index: 2;
        }

        .card-label {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
            transition: color 0.2s ease;
        }

        .check-icon {
            color: var(--accent-green);
            opacity: 0;
            transform: scale(0.5);
            transition: all var(--transition-speed) cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 22px;
            height: 22px;
        }

        /* States for downloaded card */
        .card.downloaded {
            border-color: var(--accent-green);
            background-color: #f0fdf4;
        }
        
        .card.downloaded .img-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.3);
            pointer-events: none;
            z-index: 1;
        }

        .card.downloaded .card-info {
            background-color: #f0fdf4;
        }

        .card.downloaded .card-label {
            color: var(--accent-green);
        }

        .card.downloaded .check-icon {
            opacity: 1;
            transform: scale(1);
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 20px 0 40px;
            color: var(--text-muted);
        }

        footer p {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        /* Mobile text scaling */
        @media (max-width: 480px) {
            h1 { font-size: 1.7rem; }
            .container { padding: 30px 16px; }
            .card-info { padding: 10px 12px; }
            .card-label { font-size: 0.85rem; }
            .check-icon { width: 18px; height: 18px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Your Coloring Pages Are Ready</h1>
            <p class="subtext">Tap any image to download</p>
            
            <div class="progress-container">
                <div class="progress-text" id="progressText">You've downloaded 0 of 60 pages</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
            </div>
        </header>

        <!-- Gallery Grid Container -->
        <main class="gallery-grid" id="galleryGrid"></main>

        <footer>
            <p>Kidspark</p>
        </footer>
    </div>

    <!-- PDF.js library for rendering thumbnails from the coloring page PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <script>
        // Set the worker URL (required for PDF.js to work in a separate thread)
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        document.addEventListener('DOMContentLoaded', () => {
            const STORAGE_KEY = 'kidspark_downloads';
            
            const PAGES = [
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-1.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-2.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-3.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-4.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-5.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-6.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-7.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-8.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-9.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-10.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-11.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-12.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-13.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-14.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-15.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-16.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-17.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-18.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-19.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-20.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-21.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-22.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-23.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-24.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-25.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-26.pdf",
                "kidspark coloring books/pages/Alphabet/Alphabet Coloring pages (2)-27.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-1.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-2.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-3.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-4.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-5.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-6.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-7.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-8.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-9.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-10.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-11.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-12.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-13.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-14.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-15.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-16.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-17.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-18.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-19.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-20.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-21.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-22.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-23.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-24.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-25.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-26.pdf",
                "kidspark coloring books/pages/Food/Printable Food Alphabet Coloring Book (3)-27.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-1.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-2.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-3.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-4.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-5.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-6.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-7.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-8.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-9.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-10.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-11.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-12.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-13.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-14.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-15.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-16.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-17.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-18.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-19.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-20.pdf",
                "kidspark coloring books/pages/fruit/Fruits Coloring Pages (2)-21.pdf",
                "kidspark coloring books/pages/Wildlife/wildlife coloring pages (3)-1.pdf",
                "kidspark coloring books/pages/Wildlife/wildlife coloring pages (3)-2.pdf",
                "kidspark coloring books/pages/Wildlife/wildlife coloring pages (3)-3.pdf",
                "kidspark coloring books/pages/Wildlife/wildlife coloring pages (3)-4.pdf",
                "kidspark coloring books/pages/Wildlife/wildlife coloring pages (3)-5.pdf",
                "kidspark coloring books/pages/Wildlife/wildlife coloring pages (3)-6.pdf",
                "kidspark coloring books/pages/Wildlife/wildlife coloring pages (3)-7.pdf",
                "kidspark coloring books/pages/Wildlife/wildlife coloring pages (3)-8.pdf",
                "kidspark coloring books/pages/Wildlife/wildlife coloring pages (3)-9.pdf",
                "kidspark coloring books/pages/Wildlife/wildlife coloring pages (3)-10.pdf"
            ];

            const TOTAL_PAGES = PAGES.length;
            const galleryGrid = document.getElementById('galleryGrid');
            const progressText = document.getElementById('progressText');
            const progressBar = document.getElementById('progressBar');

            let downloadedItems = [];
            try {
                const storedValue = localStorage.getItem(STORAGE_KEY);
                if (storedValue) downloadedItems = JSON.parse(storedValue);
            } catch (e) { console.error(e); }

            function updateProgress() {
                const count = downloadedItems.length;
                progressText.innerText = `You've downloaded ${count} of ${TOTAL_PAGES} pages`;
                progressBar.style.width = `${(count / TOTAL_PAGES) * 100}%`;
            }

            const checkmarkSVG = `
                <svg class="check-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            `;

            function getLabel(path) {
                const parts = path.split('/');
                const filename = parts[parts.length - 1];
                const category = parts[parts.length - 2];
                const numMatch = filename.match(/-(\d+)\.pdf$/);
                return `${category} - Page ${numMatch ? numMatch[1] : ''}`;
            }

            // Function to render a PDF thumbnail onto a canvas
            async function renderThumbnail(url, canvas) {
                try {
                    const loadingTask = pdfjsLib.getDocument(url);
                    const pdf = await loadingTask.promise;
                    const page = await pdf.getPage(1);
                    
                    const viewport = page.getViewport({ scale: 0.5 }); // Low scale for thumbnail performance
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    canvas.classList.add('rendered');
                    canvas.parentElement.querySelector('.placeholder-text')?.remove();
                } catch (error) {
                    console.error('Error rendering PDF thumbnail:', error);
                }
            }

            // Intersection Observer to render only visible thumbnails
            const observerOptions = { root: null, rootMargin: '200px', threshold: 0.1 };
            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const canvas = entry.target.querySelector('canvas');
                        const url = entry.target.dataset.url;
                        if (canvas && !canvas.classList.contains('rendered')) {
                            renderThumbnail(url, canvas);
                        }
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            const fragment = document.createDocumentFragment();

            PAGES.forEach((path) => {
                const pageId = path;
                const isDownloaded = downloadedItems.includes(pageId);
                const label = getLabel(path);
                
                const card = document.createElement('div');
                card.className = `card ${isDownloaded ? 'downloaded' : ''}`;
                card.dataset.id = pageId;
                card.dataset.url = path;

                card.innerHTML = `
                    <div class="img-wrapper">
                        <canvas></canvas>
                        <div class="placeholder-text" style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 0.8rem; text-align: center; padding: 10px;">
                            Loading Preview...
                        </div>
                    </div>
                    <div class="card-info">
                        <span class="card-label">${isDownloaded ? 'Downloaded' : label}</span>
                        ${checkmarkSVG}
                    </div>
                `;

                card.addEventListener('click', (e) => {
                    e.preventDefault();
                    const link = document.createElement('a');
                    link.href = path;
                    link.download = path.split('/').pop();
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    if (!downloadedItems.includes(pageId)) {
                        downloadedItems.push(pageId);
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(downloadedItems));
                        card.classList.add('downloaded');
                        card.querySelector('.card-label').innerText = 'Downloaded';
                        updateProgress();
                    }
                });

                fragment.appendChild(card);
                observer.observe(card); // Start observing for lazy render
            });

            galleryGrid.appendChild(fragment);
            updateProgress();
        });
    </script>
</body>
</html>
